<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Type + Skin Tone Detector — POC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gray-950">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const FITZ = [
      { type: 'Type I',   label: 'Very Fair',       minL: 210 },
      { type: 'Type II',  label: 'Fair',             minL: 180 },
      { type: 'Type III', label: 'Medium',           minL: 145 },
      { type: 'Type IV',  label: 'Olive / Med Dark', minL: 110 },
      { type: 'Type V',   label: 'Brown',            minL: 70  },
      { type: 'Type VI',  label: 'Deep Brown/Black', minL: 0   },
    ];

    function getFitz(r, g, b) {
      const L = 0.299 * r + 0.587 * g + 0.114 * b;
      return FITZ.find(f => L >= f.minL) ?? FITZ[5];
    }

    function toHex(r, g, b) {
      return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function classifyBody(sh, wa, hi) {
      if (hi <= 0 || sh <= 0) return '—';
      const s2h = sh / hi;
      const w2h = wa / hi;
      if (s2h > 1.15)                                 return 'Inverted Triangle';
      if (hi / sh > 1.15)                             return 'Pear';
      if (w2h > 0.88)                                 return 'Apple';
      if (s2h >= 0.90 && s2h <= 1.10 && w2h < 0.82) return 'Hourglass';
      return 'Rectangle';
    }

    function cmToFtIn(cm) {
      const totalIn = cm / 2.54;
      const ft = Math.floor(totalIn / 12);
      const inch = Math.round(totalIn % 12);
      return `${ft}'${inch}"`;
    }

    // Format a raw px value: show cm if scale is set, otherwise show px
    function fmt(px, scale, decimals = 1) {
      if (!scale) return `${Math.round(px)} px`;
      return `${(px / scale.pxPerCm).toFixed(decimals)} cm`;
    }

    const TYPE_COLOR = {
      'Hourglass':         'text-pink-400',
      'Pear':              'text-yellow-400',
      'Apple':             'text-orange-400',
      'Rectangle':         'text-blue-400',
      'Inverted Triangle': 'text-purple-400',
      '—':                 'text-gray-600',
    };

    function drawMeasureLine(ctx, y, x1, x2, W, H, color, label) {
      const py = y * H, px1 = x1 * W, px2 = x2 * W;
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(px1, py);
      ctx.lineTo(px2, py);
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.stroke();
      [px1, px2].forEach(px => {
        ctx.beginPath();
        ctx.moveTo(px, py - 5);
        ctx.lineTo(px, py + 5);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.stroke();
      });
      ctx.fillStyle = color;
      ctx.font = 'bold 11px monospace';
      ctx.fillText(label, (px1 + px2) / 2 - ctx.measureText(label).width / 2, py - 8);
    }

    function App() {
      const videoRef       = useRef(null);
      const canvasRef      = useRef(null);
      const sampleRef      = useRef(null);
      const scaleRef       = useRef(null);   // { pxPerCm } — read inside onResults
      const shoulderPxRef  = useRef(0);      // live shoulder px, used to auto-fill calibration

      const [status, setStatus]         = useState('Initializing…');
      const [data, setData]             = useState(null);
      const [scale, setScale]           = useState(null);  // null = not calibrated
      const [refPxInput, setRefPxInput] = useState('');    // user enters reference px
      const [refCmInput, setRefCmInput] = useState('');    // user enters real cm
      const [scaleErr, setScaleErr]     = useState('');
      const [facingMode, setFacingMode] = useState('user');

      // Auto-fill px input from live shoulder detection when field is empty
      function useShoulderPx() {
        const v = Math.round(shoulderPxRef.current);
        if (v > 0) { setRefPxInput(String(v)); setScaleErr(''); }
      }

      function doSetScale() {
        const px = parseFloat(refPxInput);
        const cm = parseFloat(refCmInput);
        if (isNaN(px) || px <= 0)          { setScaleErr('Enter a valid px value'); return; }
        if (isNaN(cm) || cm <= 0 || cm > 300) { setScaleErr('Enter a valid cm value'); return; }
        const s = { pxPerCm: px / cm };
        scaleRef.current = s;
        setScale(s);
        setScaleErr('');
      }

      function clearScale() {
        scaleRef.current = null;
        setScale(null);
        setRefPxInput('');
        setRefCmInput('');
        setScaleErr('');
      }

      const onResults = useCallback((results) => {
        const video  = videoRef.current;
        const canvas = canvasRef.current;
        const sample = sampleRef.current;
        if (!canvas || !video) return;

        const W = video.videoWidth  || 640;
        const H = video.videoHeight || 480;
        canvas.width  = W;
        canvas.height = H;

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, W, H);
        ctx.drawImage(results.image, 0, 0, W, H);

        if (!results.poseLandmarks) {
          setStatus('No pose detected — step back from camera');
          return;
        }

        const lm = results.poseLandmarks;
        window.drawConnectors(ctx, lm, window.POSE_CONNECTIONS, { color: '#00E676', lineWidth: 2 });
        window.drawLandmarks(ctx, lm, { color: '#FF1744', lineWidth: 1, radius: 3 });

        const ls     = lm[11];
        const rs     = lm[12];
        const lh     = lm[23];
        const rh     = lm[24];
        const nose   = lm[0];
        const lAnkle = lm[27];
        const rAnkle = lm[28];

        if (!(ls && rs && lh && rh && nose)) {
          setStatus('Partial pose — ensure full body is visible');
          return;
        }

        setStatus('Live');

        // --- Raw px measurements ---
        const shoulderPx = Math.abs(rs.x - ls.x) * W;
        const hipPx      = Math.abs(rh.x - lh.x) * W;
        const wLx = ls.x + (lh.x - ls.x) * 0.55;
        const wRx = rs.x + (rh.x - rs.x) * 0.55;
        const wY  = ls.y + (lh.y - ls.y) * 0.55;
        const waistPx = Math.abs(wRx - wLx) * W * 0.82;

        shoulderPxRef.current = shoulderPx;

        const sc = scaleRef.current;

        // Labels on measurement lines: cm if calibrated, else px
        const sLabel = sc ? `S ${(shoulderPx / sc.pxPerCm).toFixed(1)}cm` : `S ${Math.round(shoulderPx)}px`;
        const wLabel = sc ? `W ${(waistPx   / sc.pxPerCm).toFixed(1)}cm` : `W ${Math.round(waistPx)}px`;
        const hLabel = sc ? `H ${(hipPx     / sc.pxPerCm).toFixed(1)}cm` : `H ${Math.round(hipPx)}px`;

        drawMeasureLine(ctx, ls.y, ls.x, rs.x, W, H, '#00BCD4', sLabel);
        drawMeasureLine(ctx, wY,   wLx,  wRx,  W, H, '#FF9800', wLabel);
        drawMeasureLine(ctx, lh.y, lh.x, rh.x, W, H, '#E040FB', hLabel);

        // --- Height (nose→ankle + 15% for head above nose) ---
        let heightPx = 0;
        if (lAnkle && rAnkle) {
          const noseY     = nose.y * H;
          const avgAnkleY = ((lAnkle.y + rAnkle.y) / 2) * H;
          const bodyPx    = avgAnkleY - noseY;
          if (bodyPx > 0) {
            heightPx = bodyPx * 1.15;
            const estTopY = noseY - bodyPx * 0.15;
            const lineX   = Math.min(lAnkle.x, rAnkle.x) * W - 18;

            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.moveTo(lineX, estTopY);
            ctx.lineTo(lineX, avgAnkleY);
            ctx.strokeStyle = '#76FF03';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);

            [estTopY, avgAnkleY].forEach(y => {
              ctx.beginPath();
              ctx.moveTo(lineX - 6, y);
              ctx.lineTo(lineX + 6, y);
              ctx.strokeStyle = '#76FF03';
              ctx.lineWidth = 2;
              ctx.stroke();
            });

            if (sc && heightPx > 0) {
              const hCm = heightPx / sc.pxPerCm;
              ctx.fillStyle = '#76FF03';
              ctx.font = 'bold 12px monospace';
              const htLabel = `${hCm.toFixed(1)}cm`;
              ctx.fillText(htLabel, lineX - ctx.measureText(htLabel).width - 4,
                           (estTopY + avgAnkleY) / 2 + 4);
            }
          }
        }

        // --- Skin tone (nose, 8px radius) ---
        sample.width  = W;
        sample.height = H;
        const sctx = sample.getContext('2d');
        sctx.drawImage(video, 0, 0, W, H);

        const nx = Math.round(nose.x * W);
        const ny = Math.round(nose.y * H);
        const SR = 8;
        const sx0 = Math.max(0, nx - SR), sy0 = Math.max(0, ny - SR);
        const sw  = Math.min(SR * 2, W - sx0), sh2 = Math.min(SR * 2, H - sy0);

        let sumR = 0, sumG = 0, sumB = 0, cnt = 0;
        try {
          const pd = sctx.getImageData(sx0, sy0, sw, sh2).data;
          for (let i = 0; i < pd.length; i += 4) {
            sumR += pd[i]; sumG += pd[i + 1]; sumB += pd[i + 2]; cnt++;
          }
        } catch (_) {}

        const skinR = cnt ? (sumR / cnt | 0) : 150;
        const skinG = cnt ? (sumG / cnt | 0) : 110;
        const skinB = cnt ? (sumB / cnt | 0) : 90;

        ctx.beginPath();
        ctx.arc(nx, ny, SR, 0, 2 * Math.PI);
        ctx.strokeStyle = '#FFEB3B';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Store raw px; display layer converts to cm using scale
        setData({
          bodyType:  classifyBody(shoulderPx, waistPx, hipPx),
          shoulderPx,
          waistPx,
          hipPx,
          heightPx,
          s2h: (shoulderPx / hipPx).toFixed(2),
          w2h: (waistPx    / hipPx).toFixed(2),
          skin: {
            fitz: getFitz(skinR, skinG, skinB),
            hex:  toHex(skinR, skinG, skinB),
            rgb:  `rgb(${skinR}, ${skinG}, ${skinB})`,
          },
        });
      }, []);

      useEffect(() => {
        const pose = new window.Pose({
          locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`,
        });
        pose.setOptions({
          modelComplexity: 1,
          smoothLandmarks: true,
          enableSegmentation: false,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5,
        });
        pose.onResults(onResults);

        const camera = new window.Camera(videoRef.current, {
          onFrame: async () => {
            if (videoRef.current) await pose.send({ image: videoRef.current });
          },
          width: 640,
          height: 480,
          facingMode,
        });

        camera.start()
          .then(() => setStatus('Starting detection…'))
          .catch(e => setStatus(`Camera error: ${e.message}`));

        return () => { camera.stop(); pose.close(); };
      }, [onResults, facingMode]);

      const Row = ({ label, val }) => (
        <div className="flex justify-between gap-2">
          <span className="text-gray-500 shrink-0">{label}</span>
          <span className="tabular-nums text-right">{val ?? '—'}</span>
        </div>
      );

      const heightCm  = (scale && data?.heightPx)  ? data.heightPx  / scale.pxPerCm : null;
      const calibrated = !!scale;

      return (
        <div className="flex flex-col md:flex-row min-h-screen bg-gray-950 text-gray-100 font-mono">

          {/* Camera panel */}
          <div className="flex flex-col p-3 md:p-4 gap-1 md:shrink-0">
            <div className="flex justify-between items-center text-xs text-gray-500 mb-1">
              <span className="text-gray-300 font-bold tracking-wide">Body Detector POC</span>
              <span className={
                status === 'Live'                  ? 'text-green-400' :
                status.startsWith('Camera error') ? 'text-red-400'   : 'text-yellow-400'
              }>● {status}</span>
            </div>

            <div className="relative bg-black border border-gray-800">
              <video ref={videoRef} className="hidden" autoPlay playsInline muted />
              <canvas ref={canvasRef} className="block w-full" style={{ maxWidth: 640 }} />
              <canvas ref={sampleRef} className="hidden" />
              {!data && (
                <div className="absolute inset-0 flex items-center justify-center text-gray-600 text-sm pointer-events-none text-center px-4">
                  Stand 1.5–2 m from camera — full body in frame
                </div>
              )}
            </div>

            <div className="flex justify-between items-center mt-1">
              <div className="text-xs text-gray-700">
                Green line = height &nbsp;·&nbsp; Yellow = skin sample
              </div>
              <button
                onClick={() => setFacingMode(m => m === 'user' ? 'environment' : 'user')}
                className="text-xs text-gray-400 bg-gray-800 active:bg-gray-700 px-2 py-1 rounded"
              >
                {facingMode === 'user' ? 'Front cam' : 'Back cam'}
              </button>
            </div>
          </div>

          {/* Results + calibration panel */}
          <div className="flex-1 p-3 md:p-4 md:pt-6 border-t md:border-t-0 md:border-l border-gray-800 md:max-w-[16rem]">
            <div className="flex flex-col gap-4 text-sm">

              {/* ── SCALE CALIBRATION ────────────────── */}
              <div className={`rounded border p-3 space-y-2 ${calibrated ? 'border-green-800 bg-green-950/30' : 'border-gray-700 bg-gray-900/40'}`}>
                <div className="text-xs text-gray-400 uppercase tracking-widest">
                  Camera Scale {calibrated ? '✓ Set' : '— not set'}
                </div>

                {calibrated ? (
                  <div className="space-y-1">
                    <div className="text-xs text-gray-400">
                      1 cm = {scale.pxPerCm.toFixed(2)} px
                    </div>
                    <div className="text-xs text-gray-600 leading-relaxed">
                      All measurements now in cm. Keep camera fixed — same spot for every person.
                    </div>
                    <button onClick={clearScale} className="text-xs text-gray-500 underline mt-1">
                      Reset scale
                    </button>
                  </div>
                ) : (
                  <div className="space-y-2">
                    <div className="text-xs text-gray-500 leading-relaxed">
                      Fix camera. Have person stand in spot. Enter any measurement you see on screen (px) and its real size (cm).
                    </div>

                    {/* Live shoulder hint */}
                    <div className="flex items-center justify-between text-xs">
                      <span className="text-gray-500">
                        Live shoulder: <span className="text-gray-300 tabular-nums">
                          {data ? `${Math.round(data.shoulderPx)} px` : '— px'}
                        </span>
                      </span>
                      <button
                        onClick={useShoulderPx}
                        className="text-blue-500 underline text-xs"
                      >use</button>
                    </div>

                    <div className="flex gap-2 items-center">
                      <div className="flex flex-col gap-1 flex-1">
                        <input
                          type="number"
                          placeholder="px value"
                          value={refPxInput}
                          onChange={e => { setRefPxInput(e.target.value); setScaleErr(''); }}
                          onKeyDown={e => e.key === 'Enter' && doSetScale()}
                          className="w-full bg-gray-800 border border-gray-700 text-white px-2 py-2 text-sm rounded focus:outline-none"
                        />
                        <input
                          type="number"
                          placeholder="real cm"
                          value={refCmInput}
                          onChange={e => { setRefCmInput(e.target.value); setScaleErr(''); }}
                          onKeyDown={e => e.key === 'Enter' && doSetScale()}
                          className="w-full bg-gray-800 border border-gray-700 text-white px-2 py-2 text-sm rounded focus:outline-none"
                        />
                      </div>
                      <button
                        onClick={doSetScale}
                        className="bg-blue-700 active:bg-blue-600 text-white px-3 py-4 text-xs rounded"
                      >Set</button>
                    </div>
                    {scaleErr && <div className="text-red-400 text-xs">{scaleErr}</div>}
                  </div>
                )}
              </div>

              {/* ── RESULTS GRID ────────────────────── */}
              <div className="grid grid-cols-2 md:flex md:flex-col gap-4 md:gap-4">

                {/* Height */}
                <div>
                  <div className="text-xs text-gray-500 uppercase tracking-widest mb-1">Height</div>
                  {heightCm ? (
                    <div>
                      <div className="text-2xl font-bold text-green-400">{heightCm.toFixed(1)} cm</div>
                      <div className="text-gray-400 text-sm">{cmToFtIn(heightCm)}</div>
                    </div>
                  ) : (
                    <div className="text-gray-600 text-lg">
                      {calibrated ? '—' : 'Set scale first'}
                    </div>
                  )}
                </div>

                {/* Body type */}
                <div>
                  <div className="text-xs text-gray-500 uppercase tracking-widest mb-1">Body Type</div>
                  <div className={`text-xl font-bold leading-tight ${data ? (TYPE_COLOR[data.bodyType] ?? 'text-white') : 'text-gray-700'}`}>
                    {data?.bodyType ?? '—'}
                  </div>
                </div>

                {/* Measurements */}
                <div>
                  <div className="text-xs text-gray-500 uppercase tracking-widest mb-2">
                    Measurements {calibrated ? '(cm)' : '(px)'}
                  </div>
                  <div className="space-y-1">
                    <Row label="Shoulder" val={data && fmt(data.shoulderPx, scale)} />
                    <Row label="Waist ~"  val={data && fmt(data.waistPx,    scale)} />
                    <Row label="Hip"      val={data && fmt(data.hipPx,       scale)} />
                    <div className="border-t border-gray-800 my-1" />
                    <Row label="S/H" val={data?.s2h} />
                    <Row label="W/H" val={data?.w2h} />
                  </div>
                </div>

                {/* Skin tone */}
                <div>
                  <div className="text-xs text-gray-500 uppercase tracking-widest mb-2">Skin Tone</div>
                  {data ? (
                    <div className="space-y-2">
                      <div className="flex items-center gap-2">
                        <div
                          className="w-9 h-9 rounded border border-gray-700 shrink-0"
                          style={{ backgroundColor: data.skin.hex }}
                        />
                        <div>
                          <div className="font-bold text-xs">{data.skin.fitz.type}</div>
                          <div className="text-xs text-gray-400">{data.skin.fitz.label}</div>
                        </div>
                      </div>
                      <div className="text-xs text-gray-500 space-y-0.5">
                        <div>{data.skin.hex.toUpperCase()}</div>
                        <div>{data.skin.rgb}</div>
                      </div>
                    </div>
                  ) : <div className="text-gray-700">—</div>}
                </div>

              </div>

              {/* Notes */}
              <div className="border-t border-gray-800 pt-3 text-xs text-gray-600 space-y-1 leading-relaxed">
                <div>Height: nose→ankle + 15% head estimate</div>
                <div>Waist: interpolated — no direct landmark</div>
                <div>Skin: 8px radius sample at nose</div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
